quarkus.http.port=8080

# DataSource - PostgreSQL (ver local/docker-compose.yml)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=ada.tech
quarkus.datasource.password=turma1660
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/meeting_room

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ---------------------------------------------------------------
# JWT - Seguran�a
# ---------------------------------------------------------------
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=meeting-room-api
smallrye.jwt.sign.key.location=privateKey.pem

# ---------------------------------------------------------------
# Observabilidade - Logs
# Inclui correlationId (MDC) no formato: [correlationId]
# ---------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."br.com.ada.classes.meetingroom".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] [%X{correlationId}] (%t) %s%e%n

# ---------------------------------------------------------------
# Observabilidade - Métricas (Micrometer / Prometheus)
# Endpoint: GET /q/metrics
# ---------------------------------------------------------------
quarkus.micrometer.enabled=true
quarkus.micrometer.registry-enabled-default=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ---------------------------------------------------------------
# Observabilidade - Health
# Liveness:  GET /q/health/live
# Readiness: GET /q/health/ready  (inclui check de banco de dados)
# ---------------------------------------------------------------
quarkus.smallrye-health.ui.enable=true

