quarkus.http.port=8080

# DataSource - PostgreSQL (ver local/docker-compose.yml)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=ada.tech
quarkus.datasource.password=turma1660
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/meeting_room
quarkus.datasource.metrics.enabled=true
# Instrumenta queries SQL no trace do OpenTelemetry — aparece como spans no Jaeger
quarkus.datasource.jdbc.telemetry=true

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.metrics.enabled=true

# ---------------------------------------------------------------
# JWT - Segurança
# ---------------------------------------------------------------
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=meeting-room-api
smallrye.jwt.sign.key.location=privateKey.pem

# ---------------------------------------------------------------
# Observabilidade - Logs
# Inclui correlationId e traceId/spanId (MDC) no formato do log
# %X{traceId} e %X{spanId} são injetados automaticamente pelo OpenTelemetry
# ---------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."br.com.ada.classes.meetingroom".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] [%X{correlationId}] [trace=%X{traceId} span=%X{spanId}] (%t) %s%e%n

# ---------------------------------------------------------------
# Observabilidade - Distributed Tracing (OpenTelemetry)
# Exporta spans via OTLP para Jaeger/Zipkin/Grafana Tempo
# Endpoint padrão: http://localhost:4317 (Jaeger all-in-one ou otel-collector)
# ---------------------------------------------------------------
quarkus.otel.enabled=true
quarkus.otel.service.name=meeting-room
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
# Para desabilitar em testes locais sem coletor OTLP, use: quarkus.otel.sdk.disabled=true
quarkus.otel.traces.sampler=always_on

# ---------------------------------------------------------------
# Observabilidade - M?tricas (Micrometer / Prometheus)
# Endpoint: GET /q/metrics
# ---------------------------------------------------------------
quarkus.micrometer.enabled=true
quarkus.micrometer.registry-enabled-default=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ---------------------------------------------------------------
# Observabilidade - Health
# Liveness:  GET /q/health/live
# Readiness: GET /q/health/ready  (inclui check de banco de dados)
# ---------------------------------------------------------------
quarkus.smallrye-health.ui.enable=true

# ---------------------------------------------------------------
# Integração - BrasilAPI (Feriados)
# REST Client: GET https://brasilapi.com.br/api/feriados/v1/{year}
# ---------------------------------------------------------------
quarkus.rest-client.brasil-api.url=https://brasilapi.com.br
quarkus.rest-client.brasil-api.connect-timeout=3000
quarkus.rest-client.brasil-api.read-timeout=5000

# ---------------------------------------------------------------
# Feature Toggles - Validações de Reserva
# Desabilite para ambientes de teste ou datas especiais
# ---------------------------------------------------------------
meeting-room.validation.holiday.enabled=true
meeting-room.validation.weekend.enabled=true

# Fallback da BrasilAPI:
#   true  = ignora validação de feriado quando a API está fora (fail-open)
#   false = bloqueia a reserva quando a API está fora (fail-closed)
meeting-room.integration.brasil-api.fallback.allow-continue=true

# ---------------------------------------------------------------
# Fault Tolerance - Métricas do SmallRye (expostas via Micrometer)
# ---------------------------------------------------------------
smallrye.faulttolerance.metrics.enabled=true

# ---------------------------------------------------------------
# Fault Tolerance - Retry da BrasilAPI
# Formato: <NomeSimplesDaClasse>/<método>/Retry/<par�metro>=<valor>
# ---------------------------------------------------------------
HolidayClientDelegate/fetchNationalHolidays/Retry/maxRetries=3
HolidayClientDelegate/fetchNationalHolidays/Retry/delay=100
HolidayClientDelegate/fetchNationalHolidays/Retry/delayUnit=MILLIS
HolidayClientDelegate/fetchNationalHolidays/Retry/jitter=25
HolidayClientDelegate/fetchNationalHolidays/Retry/jitterDelayUnit=MILLIS
HolidayClientDelegate/fetchNationalHolidays/Retry/maxDuration=5000
HolidayClientDelegate/fetchNationalHolidays/Retry/durationUnit=MILLIS

# ---------------------------------------------------------------
# Cache - Feriados (Caffeine)
# TTL de 1 dia para evitar chamadas repetidas ? BrasilAPI
# ---------------------------------------------------------------
quarkus.cache.caffeine.national-holidays.expire-after-write=P1D
