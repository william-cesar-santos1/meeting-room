# SSM Endpoint configuration
quarkus.ssm.endpoint-override=http://localhost:4566
quarkus.ssm.aws.region=us-east-1
quarkus.ssm.aws.credentials.type=static
quarkus.ssm.aws.credentials.static-provider.access-key-id=test
quarkus.ssm.aws.credentials.static-provider.secret-access-key=test

# SSM Parameter Store configuration
quarkus.ssm.config.enabled=false
quarkus.meeting-room.ssm.config.enabled=true
quarkus.meeting-room.ssm.config.path=meeting-room/dev/
quarkus.meeting-room.ssm.config.recursive=true
quarkus.meeting-room.ssm.config.with-decryption=true
