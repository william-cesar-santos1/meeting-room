services:

  postgres:
    image: postgres:16.4
    container_name: meeting_room_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_room
      POSTGRES_USER: ada.tech
      POSTGRES_PASSWORD: turma1660
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - meeting_room_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ada.tech -d meeting_room"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meeting-room-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: meeting_room_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - meeting-room-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: meeting_room_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - meeting-room-net

volumes:
  meeting_room_data:
  prometheus_data:
  grafana_data:

networks:
  meeting-room-net:
    driver: bridge

# ------------------------------------------------------------
# Como usar:
#   docker compose up -d
#
# Aguarde o container ficar healthy e então suba a aplicação:
#   ./mvnw quarkus:dev
#
# Endpoints de observabilidade:
#   Métricas (Prometheus): http://localhost:8080/q/metrics
#   Health:                http://localhost:8080/q/health
#   Prometheus UI:         http://localhost:9090
#   Grafana:               http://localhost:3000  (admin / admin)
#
# application.properties (Quarkus):
#   quarkus.datasource.db-kind=postgresql
#   quarkus.datasource.username=ada.tech
#   quarkus.datasource.password=turma1660
#   quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/meeting_room
#   quarkus.hibernate-orm.database.generation=none
# ------------------------------------------------------------
