services:

  postgres:
    image: postgres:16.4
    container_name: meeting_room_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_room
      POSTGRES_USER: ada.tech
      POSTGRES_PASSWORD: turma1660
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - meeting_room_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ada.tech -d meeting_room"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meeting-room-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: meeting_room_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # permite scrape da app rodando no host (IntelliJ)
    networks:
      - meeting-room-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: meeting_room_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - meeting-room-net

  # ---------------------------------------------------------------
  # Aplicação — build JVM
  # Subir: docker compose --profile jvm up -d
  # ---------------------------------------------------------------
  meeting-room-jvm:
    profiles: ["jvm", "all"]
    container_name: meeting_room_jvm
    build:
      context: ..
      dockerfile: docker/Dockerfile.jvm
    image: meeting-room:jvm
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/meeting_room
      QUARKUS_DATASOURCE_USERNAME: ada.tech
      QUARKUS_DATASOURCE_PASSWORD: turma1660
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meeting-room-net

  # ---------------------------------------------------------------
  # Aplicação — build Nativo
  # Subir: docker compose --profile native up -d
  # ---------------------------------------------------------------
  meeting-room-native:
    profiles: ["native", "all"]
    container_name: meeting_room_native
    build:
      context: ..
      dockerfile: docker/Dockerfile.native
    image: meeting-room:native
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/meeting_room
      QUARKUS_DATASOURCE_USERNAME: ada.tech
      QUARKUS_DATASOURCE_PASSWORD: turma1660
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meeting-room-net

volumes:
  meeting_room_data:
  prometheus_data:
  grafana_data:

networks:
  meeting-room-net:
    driver: bridge

# ------------------------------------------------------------
# Como usar:
#
#   Infraestrutura (banco + Prometheus + Grafana):
#     docker compose up -d
#
#   Apenas build JVM (porta 8080):
#     docker compose --profile jvm up -d
#
#   Apenas build Nativo (porta 8081):
#     docker compose --profile native up -d
#
#   Ambos simultaneamente:
#     docker compose --profile all up -d
#
#   Reconstruir imagens após mudanças no código:
#     docker compose --profile jvm build
#     docker compose --profile native build
#
# Endpoints:
#   App JVM:    http://localhost:8080
#   App Native: http://localhost:8081
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000  (admin / admin)

# Endpoints de observabilidade:
#   Métricas (Prometheus): http://localhost:8080/q/metrics
#   Health:                http://localhost:8080/q/health
#   Prometheus UI:         http://localhost:9090
#   Grafana:               http://localhost:3000  (admin / admin)
# ------------------------------------------------------------
