## A basic GitHub Actions workflow for your Quarkus application.

name: CI build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Build and test
        run: ./mvnw verify -B

  docker-jvm:
    name: Docker — JVM image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/meeting-room
          tags: |
            type=ref,event=branch,suffix=-jvm
            type=sha,suffix=-jvm
            type=raw,value=latest-jvm,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push JVM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-native:
    name: Docker — Native image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/meeting-room
          tags: |
            type=ref,event=branch,suffix=-native
            type=sha,suffix=-native
            type=raw,value=latest-native,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.native
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
