services:

  postgres:
    image: postgres:16.4
    container_name: meeting_room_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_room
      POSTGRES_USER: ada.tech
      POSTGRES_PASSWORD: turma1660
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/postgres:/docker-entrypoint-initdb.d:ro
      - meeting_room_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ada.tech -d meeting_room"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meeting-room-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: meeting_room_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # permite scrape da app rodando no host (IntelliJ)
    networks:
      - meeting-room-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: meeting_room_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./scripts/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - meeting-room-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: meeting_room_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (recebe spans da aplicação)
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - meeting-room-net

  localstack:
    image: localstack/localstack:3
    container_name: meeting_room_localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SERVICES: ssm
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localstack
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    volumes:
      - ./scripts/aws/parameter-store.sh:/etc/localstack/init/ready.d/parameter-store.sh:ro
      - ./scripts/aws/keys:/usr/share/
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep '\"ssm\": *\"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - meeting-room-net

  meeting-room-jvm:
    profiles: ["jvm", "all"]
    build:
      context: ..
      dockerfile: src/main/docker/Dockerfile.jvm
    image: meeting-room:jvm
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/meeting_room
      QUARKUS_SSM_ENDPOINT_OVERRIDE: http://localstack:4566
      QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4317
      ENVIRONMENT: ${ENVIRONMENT:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - meeting-room-net
    deploy:
      replicas: 3

  meeting-room-native:
    profiles: ["native", "all"]
    build:
      context: ..
      dockerfile: src/main/docker/Dockerfile.native
    image: meeting-room:native
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/meeting_room
      QUARKUS_SSM_ENDPOINT_OVERRIDE: http://localstack:4566
      QUARKUS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4317
      ENVIRONMENT: ${ENVIRONMENT:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - meeting-room-net
    deploy:
      replicas: 3

  nginx:
    profiles: ["jvm", "native", "all"]
    image: nginx:1.27-alpine
    container_name: meeting_room_nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./scripts/nginx/nginx-${PROFILE}.conf:/etc/nginx/nginx.conf:ro
    networks:
      - meeting-room-net

volumes:
  meeting_room_data:
  prometheus_data:
  grafana_data:
  localstack_data:

networks:
  meeting-room-net:
    driver: bridge
