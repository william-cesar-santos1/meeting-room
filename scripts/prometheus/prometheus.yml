global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "meeting-room-local"
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - host.docker.internal:8080
    relabel_configs:
      - target_label: application
        replacement: meeting-room
      - target_label: runtime
        replacement: local

  - job_name: "meeting-room-jvm"
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - meeting-room-jvm:8080
    relabel_configs:
      - target_label: application
        replacement: meeting-room
      - target_label: runtime
        replacement: jvm

  - job_name: "meeting-room-native"
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - meeting-room-native:8080
    relabel_configs:
      - target_label: application
        replacement: meeting-room
      - target_label: runtime
        replacement: native
